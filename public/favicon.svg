<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8d5a3"/>
      <stop offset="50%"  stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="s" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7d1a38"/>
      <stop offset="100%" stop-color="#4a0f22"/>
    </linearGradient>
  </defs>

  <!-- Gold border shield -->
  <path d="M50 4 L96 18 L96 56 Q96 85 50 106 Q4 85 4 56 L4 18 Z" fill="url(#g)"/>
  <!-- Burgundy fill -->
  <path d="M50 8 L91 21 L91 56 Q91 82 50 101 Q9 82 9 56 L9 21 Z" fill="url(#s)"/>
  <!-- Inner gold line -->
  <path d="M50 12 L87 24 L87 56 Q87 80 50 97 Q13 80 13 56 L13 24 Z" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.5"/>

  <!-- Scales bar -->
  <line x1="27" y1="32" x2="73" y2="32" stroke="#C9A96E" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center pole -->
  <line x1="50" y1="22" x2="50" y2="42" stroke="#C9A96E" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left chain + pan -->
  <line x1="33" y1="32" x2="29" y2="44" stroke="#C9A96E" stroke-width="1.2"/>
  <path d="M24 44 Q29 49 34 44" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right chain + pan -->
  <line x1="67" y1="32" x2="71" y2="44" stroke="#C9A96E" stroke-width="1.2"/>
  <path d="M66 44 Q71 49 76 44" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stars -->
  <circle cx="33" cy="21" r="2" fill="#C9A96E"/>
  <circle cx="67" cy="21" r="2" fill="#C9A96E"/>

  <!-- Gavel -->
  <rect x="44" y="23" width="14" height="5" rx="1.5" fill="#C9A96E" transform="rotate(-28 51 25)"/>
  <rect x="54" y="26" width="16" height="2.5" rx="1.2" fill="#C9A96E" transform="rotate(-28 62 27)"/>

  <!-- DL monogram -->
  <text x="50" y="84"
    font-family="Georgia, serif"
    font-size="30"
    font-style="italic"
    fill="#C9A96E"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="3"
  >DL</text>
</svg>
