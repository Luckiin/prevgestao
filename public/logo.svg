<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <defs>
    <!-- Gold gradient for border -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8d5a3"/>
      <stop offset="30%"  stop-color="#C9A96E"/>
      <stop offset="60%"  stop-color="#f0e0b0"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <!-- Shield fill gradient -->
    <linearGradient id="shieldFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#7d1a38"/>
      <stop offset="50%"  stop-color="#6B1530"/>
      <stop offset="100%" stop-color="#4a0f22"/>
    </linearGradient>
    <!-- Gold text gradient -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8d5a3"/>
      <stop offset="40%"  stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── SHIELD ── -->
  <!-- Outer shadow layer -->
  <path
    d="M200 18 L372 72 L372 210 Q372 320 200 392 Q28 320 28 210 L28 72 Z"
    fill="#1a0309"
    opacity="0.4"
    transform="translate(4,10)"
    filter="url(#shadow)"
  />
  <!-- Gold border (thick) -->
  <path
    d="M200 18 L372 72 L372 210 Q372 320 200 392 Q28 320 28 210 L28 72 Z"
    fill="url(#goldBorder)"
  />
  <!-- Shield main fill -->
  <path
    d="M200 30 L358 80 L358 210 Q358 308 200 376 Q42 308 42 210 L42 80 Z"
    fill="url(#shieldFill)"
  />
  <!-- Inner thin gold line -->
  <path
    d="M200 42 L346 88 L346 210 Q346 298 200 362 Q54 298 54 210 L54 88 Z"
    fill="none"
    stroke="url(#goldBorder)"
    stroke-width="1.5"
    opacity="0.5"
  />

  <!-- ── SCALES OF JUSTICE ── -->
  <g filter="url(#glow)">
    <!-- Center pole -->
    <rect x="198" y="58" width="4" height="52" fill="url(#goldBorder)" rx="2"/>
    <!-- Horizontal bar -->
    <rect x="110" y="92" width="180" height="4" fill="url(#goldBorder)" rx="2"/>
    <!-- Left chain -->
    <line x1="132" y1="96" x2="118" y2="136" stroke="url(#goldBorder)" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Right chain -->
    <line x1="268" y1="96" x2="282" y2="136" stroke="url(#goldBorder)" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Left pan -->
    <path d="M100 136 Q118 148 136 136" stroke="url(#goldBorder)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right pan -->
    <path d="M264 136 Q282 148 300 136" stroke="url(#goldBorder)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Left pivot -->
    <circle cx="132" cy="94" r="4" fill="url(#goldBorder)"/>
    <!-- Right pivot -->
    <circle cx="268" cy="94" r="4" fill="url(#goldBorder)"/>
    <!-- Top cap -->
    <circle cx="200" cy="58" r="5" fill="url(#goldBorder)"/>

    <!-- Gavel head -->
    <rect x="188" y="66" width="36" height="14" rx="4" fill="url(#goldBorder)" transform="rotate(-30 206 73)"/>
    <!-- Gavel handle -->
    <rect x="214" y="72" width="42" height="5" rx="2.5" fill="url(#goldBorder)" transform="rotate(-30 235 74)"/>

    <!-- Stars -->
    <polygon points="130,65 133,73 141,73 135,78 137,86 130,81 123,86 125,78 119,73 127,73"
      fill="url(#goldBorder)" opacity="0.9"/>
    <polygon points="270,65 273,73 281,73 275,78 277,86 270,81 263,86 265,78 259,73 267,73"
      fill="url(#goldBorder)" opacity="0.9"/>
  </g>

  <!-- ── DL MONOGRAM ── -->
  <text
    x="200"
    y="300"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="148"
    font-style="italic"
    font-weight="400"
    fill="url(#goldText)"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="8"
    filter="url(#glow)"
  >DL</text>

  <!-- ── TEXT BELOW SHIELD ── -->
  <!-- DEISE LISBOA -->
  <text
    x="200"
    y="428"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    fill="#6B1530"
    text-anchor="middle"
    letter-spacing="10"
  >DEISE LISBOA</text>

  <!-- ADVOCACIA -->
  <text
    x="200"
    y="466"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="400"
    fill="#6B1530"
    text-anchor="middle"
    letter-spacing="14"
  >ADVOCACIA</text>
</svg>
